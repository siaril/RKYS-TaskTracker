# Render.com blueprint. In Render: New → Blueprint → connect this repo.
# It creates a Postgres database + the Next.js web service and links them.
# After the first deploy, set AUTH_GOOGLE_ID / AUTH_GOOGLE_SECRET (and optionally
# AUTH_URL) on the web service, and add the prod redirect URI in Google Console.

databases:
  - name: tasktracker-db
    databaseName: tasktracker
    user: tasktracker
    plan: free # 90-day limit on free; upgrade for production
    region: singapore

services:
  - type: web
    name: rekayasa-task-tracker
    runtime: node
    plan: free # spins down when idle on free; upgrade to keep it warm
    region: singapore
    healthCheckPath: /signin
    # Build: install deps, generate the Prisma client, build Next.
    buildCommand: npm install && npx prisma generate && npx next build
    # Start: apply DB migrations + seed (idempotent) at runtime, then serve.
    startCommand: npx prisma migrate deploy && npm run db:seed && npx next start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tasktracker-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AUTH_GOOGLE_ID
        sync: false # set in the Render dashboard
      - key: AUTH_GOOGLE_SECRET
        sync: false # set in the Render dashboard
      - key: AUTH_URL
        sync: false # optional; set to https://<your-app>.onrender.com after first deploy
      # Image storage (S3) — set these in the dashboard to persist screenshots.
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
