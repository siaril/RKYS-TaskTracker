# Scheduled email-digest trigger (Notifications Phase B).
#
# Pings the protected digest route every ~5 minutes so opted-in users get a batched
# email of their new notifications. This keeps email off the request path (no always-on
# worker) and works on any plan.
#
# SETUP (one-time): add two repo secrets under Settings → Secrets and variables → Actions
#   APP_BASE_URL  e.g. https://rekayasa-task-tracker.onrender.com   (no trailing slash)
#   CRON_SECRET   the same value set on the Render web service
# Then enable Actions for the repo. Disable this workflow if you use cron-job.org instead.
#
# NOTE: GitHub's cron is best-effort and can lag a few minutes under load — fine for a digest.
name: email-digest

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (UTC)
  workflow_dispatch: {} # allow manual runs from the Actions tab

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Ping digest endpoint
        run: |
          curl -fsS -X POST \
            -H "x-cron-key: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/cron/email-digest"
